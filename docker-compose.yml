version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gesfi-postgres
    environment:
      POSTGRES_DB: gesfi_db
      POSTGRES_USER: gesfi_user
      POSTGRES_PASSWORD: gesfi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: gesfi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gesfi.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: